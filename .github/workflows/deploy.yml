name: Deploy to hiverift.com
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy
        run: |
          cd /home/hiveriftmain/nextapp
          git fetch origin main
          git reset --hard origin/main
          npm install
          sudo /bin/rm -rf .next
          npm run build
          sudo cp /home/hiveriftmain/nextapp/.htaccess /home/hiveriftmain/public_html/.htaccess
          sudo /bin/pm2 restart hiverift
          sudo /bin/pm2 save